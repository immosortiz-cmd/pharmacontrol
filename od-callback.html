<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Conectando con OneDrive...</title>
  <style>
    body{font-family:sans-serif;background:#0e1117;color:#e2e8f4;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;flex-direction:column;gap:12px}
    .spinner{width:36px;height:36px;border:3px solid #2a3448;border-top-color:#3b82f6;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    p{font-size:14px;color:#8b9ab8}
    code{font-size:11px;background:#1c2333;padding:4px 8px;border-radius:4px;color:#06b6d4;margin-top:8px;display:block;text-align:center;word-break:break-all;max-width:500px}
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p id="msg">Conectando con OneDrive...</p>
  <code id="debug"></code>
  <script>
    const hash   = window.location.hash;
    const search = window.location.search;
    const full   = window.location.href;

    // Calcular URL base de la app (misma carpeta que od-callback.html)
    const base = window.location.href.replace('od-callback.html', '').split('#')[0];

    document.getElementById('debug').textContent = 'Base: ' + base;

    if(hash && hash.includes('access_token')) {
      const params = new URLSearchParams(hash.slice(1));
      const token  = params.get('access_token');
      if(token) {
        localStorage.setItem('pharma_od_token', token);
        localStorage.setItem('pharma_od_just_connected', '1');
        document.getElementById('msg').textContent = 'Conectado ✓ Redirigiendo...';
        // Redirigir a la raíz del repositorio
        setTimeout(() => {
          window.location.href = base;
        }, 800);
      } else {
        document.getElementById('msg').textContent = 'Error: token no recibido.';
        document.getElementById('debug').textContent = 'Hash: ' + hash;
      }
    } else if(search && search.includes('error')) {
      document.getElementById('msg').textContent = 'Error de autorización.';
      document.getElementById('debug').textContent = search;
    } else {
      document.getElementById('msg').textContent = 'Sin token — regresando...';
      setTimeout(() => { window.location.href = base; }, 1500);
    }
  </script>
</body>
</html>
